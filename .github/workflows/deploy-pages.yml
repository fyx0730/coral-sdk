# Build static bundle and publish to GitHub Pages.
# Repo → Settings → Pages → Source: GitHub Actions
#
# After deploy, the IIFE is available at:
#   https://fyx0730.github.io/coral-sdk/coral.js
# Use that URL in Snap (or any <script src="...">).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      # Vite outputs dist/coral.js — publish that folder as site root so the
      # library URL has no extra /dist/ segment.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
